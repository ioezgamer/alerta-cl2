<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta Clima Limon 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Simple animation for new alerts */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-card {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .loader {
            border-top-color: #22d3ee;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="container mx-auto p-4 md:p-8">

        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-4">
                 <div class="bg-cyan-500 rounded-full p-3 flex items-center justify-center h-16 w-16 shadow-lg">
                     <span class="text-white font-bold text-xl">ACL2</span>
                </div>
                <h1 class="text-2xl md:text-4xl font-bold text-cyan-400">Alerta Clima Limon 2</h1>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <!-- Columna de Alertas Recientes -->
            <div class="md:col-span-2">
                <h2 class="text-2xl font-semibold mb-4 border-b-2 border-cyan-500 pb-2">Alertas Recientes</h2>
                <div id="alertas-container" class="space-y-4">
                    <!-- Loading Spinner -->
                    <div id="loading" class="flex justify-center items-center p-8">
                        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-600 h-24 w-24"></div>
                    </div>
                    <!-- Las alertas se insertarán aquí dinámicamente -->
                </div>
            </div>

            <!-- Columna para Enviar Reporte -->
            <div class="md:col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg h-fit">
                <h2 class="text-xl font-semibold mb-4">¿Qué está pasando en tu comunidad?</h2>
                <form id="reporte-form" class="space-y-4">
                    <div>
                        <label for="comunidad" class="block text-sm font-medium text-gray-300">Nombre de tu comunidad</label>
                        <input type="text" id="comunidad" name="comunidad" class="mt-1 block w-full bg-gray-700 border-gray-600 text-white rounded-md shadow-sm focus:ring-cyan-500 focus:border-cyan-500 p-2" required>
                    </div>
                    <div>
                        <label for="tipo-alerta" class="block text-sm font-medium text-gray-300">Tipo de reporte</label>
                        <select id="tipo-alerta" name="tipo-alerta" class="mt-1 block w-full bg-gray-700 border-gray-600 text-white rounded-md shadow-sm focus:ring-cyan-500 focus:border-cyan-500 p-2" required>
                            <option value="Lluvia Ligera">Lluvia ligera</option>
                            <option value="Lluvia Fuerte">Lluvia fuerte</option>
                            <option value="Inundación">Inundación</option>
                            <option value="Viento Fuerte">Viento Fuerte</option>
                            <option value="Despejado">Despejado</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label for="detalles" class="block text-sm font-medium text-gray-300">Más detalles (opcional)</label>
                        <textarea id="detalles" name="detalles" rows="3" class="mt-1 block w-full bg-gray-700 border-gray-600 text-white rounded-md shadow-sm focus:ring-cyan-500 focus:border-cyan-500 p-2"></textarea>
                    </div>
                    <button type="submit" id="submit-button" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-4 rounded-lg transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                        Enviar Reporte
                    </button>
                </form>
                 <div id="success-message" class="hidden mt-4 text-center bg-green-500/20 text-green-300 p-3 rounded-lg">
                    ¡Gracias! Tu reporte ha sido enviado.
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>&copy; 2024 Alerta Clima Limon 2. Todos los derechos reservados.</p>
        </footer>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        // Import functions from the Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // This web app is designed to work with variables provided by a specific hosting environment.
        // __firebase_config, __app_id, and __initial_auth_token are expected to be globally available.
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const alertasContainer = document.getElementById('alertas-container');
        const reporteForm = document.getElementById('reporte-form');
        const successMessage = document.getElementById('success-message');
        const loadingSpinner = document.getElementById('loading');
        const submitButton = document.getElementById('submit-button');

        // Function to get an icon based on the alert type
        function getIconForAlertType(type) {
            switch(type) {
                case 'Lluvia Fuerte':
                case 'Lluvia Ligera':
                    return `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15zM12 19l-2-2m0 0l2-2m-2 2h6m-3 3v-6" /></svg>`;
                case 'Inundación':
                    return `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
                case 'Viento Fuerte':
                    return `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.125 1.125 0 010 2.25H5.625a1.125 1.125 0 010-2.25z" /></svg>`;
                default:
                    return `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            }
        }

        // Function to render alerts in the DOM
        function renderAlertas(alertas) {
            // Sort alerts from newest to oldest
            const sortedAlertas = [...alertas].sort((a, b) => b.timestamp - a.timestamp);
            
            loadingSpinner.style.display = 'none';
            alertasContainer.innerHTML = '';
            
            if (sortedAlertas.length === 0) {
                alertasContainer.innerHTML = `<div class="bg-gray-800 p-4 rounded-lg text-center text-gray-400">No hay alertas recientes. ¡Sé el primero en reportar!</div>`;
                return;
            }

            sortedAlertas.forEach(alerta => {
                const alertaCard = document.createElement('div');
                alertaCard.className = 'alert-card bg-gray-800 p-4 rounded-lg shadow-md border-l-4 border-cyan-500 flex flex-col sm:flex-row justify-between';
                
                const alertDate = alerta.timestamp?.toDate(); // Firestore timestamp to JS Date
                let timeDisplay = 'Enviando...';

                if(alertDate) {
                    const timeAgo = Math.round((new Date() - alertDate) / 60000); // minutes
                    if (timeAgo < 1) {
                        timeDisplay = 'Ahora mismo';
                    } else if (timeAgo < 60) {
                        timeDisplay = `Hace ${timeAgo} minuto${timeAgo > 1 ? 's' : ''}`;
                    } else {
                        const hoursAgo = Math.floor(timeAgo / 60);
                         timeDisplay = `Hace ${hoursAgo} hora${hoursAgo > 1 ? 's' : ''}`;
                    }
                }
                
                alertaCard.innerHTML = `
                    <div>
                        <div class="flex items-center">
                            ${getIconForAlertType(alerta.tipo)}
                            <h3 class="text-lg font-bold text-cyan-400">${alerta.comunidad}</h3>
                        </div>
                        <p class="text-gray-300 ml-8">${alerta.tipo}</p>
                        ${alerta.detalles ? `<p class="text-sm text-gray-400 mt-2 ml-8">${alerta.detalles}</p>` : ''}
                    </div>
                    <div class="text-sm text-gray-500 mt-2 sm:mt-0 text-left sm:text-right flex-shrink-0">
                        ${timeDisplay}
                    </div>
                `;
                alertasContainer.appendChild(alertaCard);
            });
        }

        // Handle form submission
        reporteForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButton.disabled = true;
            submitButton.textContent = 'Enviando...';

            const comunidad = e.target.comunidad.value.trim();
            const tipoAlerta = e.target['tipo-alerta'].value;
            const detalles = e.target.detalles.value.trim();

            if (comunidad && tipoAlerta) {
                try {
                    // Add a new document with a generated id.
                    const docRef = await addDoc(collection(db, `/artifacts/${appId}/public/data/alerts`), {
                        comunidad: comunidad,
                        tipo: tipoAlerta,
                        detalles: detalles,
                        timestamp: serverTimestamp()
                    });
                    console.log("Document written with ID: ", docRef.id);
                    
                    reporteForm.reset();
                    successMessage.classList.remove('hidden');
                    setTimeout(() => {
                        successMessage.classList.add('hidden');
                    }, 3000);

                } catch (error) {
                    console.error("Error adding document: ", error);
                    alert("Hubo un error al enviar tu reporte. Inténtalo de nuevo.");
                } finally {
                     submitButton.disabled = false;
                     submitButton.textContent = 'Enviar Reporte';
                }
            }
        });

        // Main function to initialize and listen
        async function main() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Listen for real-time updates
                const q = query(collection(db, `/artifacts/${appId}/public/data/alerts`));
                onSnapshot(q, (querySnapshot) => {
                    const alertas = [];
                    querySnapshot.forEach((doc) => {
                        alertas.push({ id: doc.id, ...doc.data() });
                    });
                    renderAlertas(alertas);
                }, (error) => {
                    console.error("Error getting documents: ", error);
                    loadingSpinner.style.display = 'none';
                    alertasContainer.innerHTML = `<div class="bg-red-800 p-4 rounded-lg text-center text-red-200">Error al cargar las alertas. Revisa la conexión.</div>`;
                });

            } catch (error) {
                console.error("Firebase initialization failed:", error);
                loadingSpinner.style.display = 'none';
                alertasContainer.innerHTML = `<div class="bg-red-800 p-4 rounded-lg text-center text-red-200">No se pudo conectar con el servicio de alertas.</div>`;
            }
        }
        
        main();

    </script>
</body>
</html>
